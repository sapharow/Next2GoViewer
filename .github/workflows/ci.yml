name: PR CI

on:
  pull_request:
    branches:
      - "**"

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Build app
        run: |
          set -o pipefail
          xcodebuild \
            -project Next2GoViewer.xcodeproj \
            -scheme Next2GoViewer \
            -destination "generic/platform=iOS Simulator" \
            build | xcbeautify

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild \
            -project Next2GoViewer.xcodeproj \
            -scheme Next2GoViewer \
            -destination "platform=iOS Simulator,name=iPhone 17" \
            test | xcbeautify
